<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joke Generator</title>
    <link rel="stylesheet" href="style.css">
    <link href="data:image/x-icon;base64,AAABAAEAEBAQAAEABAAoAQAAFgAAACgAAAAQAAAAIAAAAAEABAAAAAAAgAAAAAAAAAAAAAAAEAAAAAAAAAAAAAAAyZQAAP///wCZcAAAqHsAAPCwAACwgQAA/7sAAPq3AAD/1mYA/8gwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAMzMzAAAAADM2ZmMzAAAERAAAAGRAAARAAAAABkAAZgAAAAAAZgBhAAAAAAARABUFd3dXUFEAFXd3d3d3VQBYqgCqAHd1AHqqIKogqncACgqqqqqgoAAKoAmZkAqgAACpmZmZmQAAAAmZmZkAAAAAAAAAAAAAD4HwAA4AcAAMADAACAAQAAgAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAIABAACAAQAAwAMAAOAHAADwHwAA" rel="icon" type="image/x-icon">

<body>
    <div class="container">
        <h1 class="heading">Joke Generator</h1>
        <div class="joke-container">
           <p class="joke">There are only 10 kinds of people in this world: those who know binary and those who don't.</p>

           <div class="type-container">
            <div class="type">
                <input type="checkbox" name="" class="jokeType" value="Any" id="any" checked>
                <label for="">Any</label>
            </div>
            <div class="type">
                <input type="checkbox" name="" class="jokeType" value="Misc" id="Misc" checked>
                <label for="">Misc</label>
            </div>
            <div class="type">
                <input type="checkbox" name="" class="jokeType" value="Programming" id="program">
                <label for="">Programming</label>
            </div>
            <div class="type">
                <input type="checkbox" name="" class="jokeType" value="Dark" id="dark">
                <label for="">Dark</label>
            </div>
            <div class="type">
                <input type="checkbox" name="" class="jokeType" value="Pun" id="Pun">
                <label for="">Pun</label>
            </div>
           </div>
        </div>
        <button class="jokeBtn">New Joke</button>

        <div class="copyright"><a href="https://github.com/Komal265/10Days-10Projects-Javascript">10Days-10Projects-Javascript</a>
        <p>Made by KomalSalunkhe</p>
    </div>
    </div>

     

    <script src="index.js"></script>

</body>
</html>
